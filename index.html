<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 가상 붙박이장 플래너</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">AI Closet <span>Visualizer</span></div>
            <h1>꿈꾸던 붙박이장을 미리 만나보세요</h1>
            <p>사진 한 장으로 간편하게 시작하는 가상 인테리어 솔루션</p>
        </header>

        <main>
            <section class="upload-section card">
                <div class="upload-box" id="drop-zone">
                    <input type="file" id="image-upload" accept="image/*">
                    <label for="image-upload" class="upload-label">
                        <div class="icon">📸</div>
                        <span>방 사진을 업로드하거나 여기로 끌어다 놓으세요</span>
                        <small>JPG, PNG 형식 (최대 10MB)</small>
                    </label>
                </div>
            </section>

            <section class="preview-section">
                <div class="preview-grid">
                    <div class="image-card card">
                        <h3>원본 공간</h3>
                        <div class="img-wrapper">
                            <div class="empty-state" id="original-empty">사진을 업로드해주세요</div>
                            <img id="original-image" src="#" alt="원본 사진">
                        </div>
                    </div>
                    <div class="image-card card">
                        <h3>가상 설치 결과</h3>
                        <div class="img-wrapper">
                            <div class="empty-state" id="modified-empty">AI가 분석 중입니다...</div>
                            <img id="modified-image" src="#" alt="붙박이장 설치 후">
                        </div>
                    </div>
                </div>
            </section>

            <div class="actions">
                <button id="add-closet-btn" class="primary-btn">
                    <span class="btn-icon">✨</span> 붙박이장 자동 설치하기
                </button>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 AI Interior Lab. All rights reserved.</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
