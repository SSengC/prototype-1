<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모모의 방 - 방탈출 게임</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 인트로 화면 -->
    <div id="intro-screen" class="screen">
        <h1 class="fade-in-text">안녕하세요. 모모의 방입니다.</h1>
    </div>

    <!-- 게임 메인 화면 -->
    <div id="game-screen" class="screen hidden">
        <header>
            <div class="timer">남은 시간: <span id="time-left">60:00</span></div>
        </header>

        <main class="game-container">
            <div class="room-view card">
                <div class="room-image" id="room-image">
                    <!-- 게임 내부 요소들 -->
                    <div class="clickable-item" id="item-desk" style="top: 60%; left: 20%;"></div>
                    <div class="clickable-item" id="item-painting" style="top: 20%; left: 70%;"></div>
                    <div class="clickable-item" id="item-door" style="top: 40%; left: 45%;"></div>
                </div>
            </div>

            <div class="inventory card">
                <h3>소지품</h3>
                <div class="inventory-slots">
                    <div class="slot" id="slot-1"></div>
                    <div class="slot" id="slot-2"></div>
                    <div class="slot" id="slot-3"></div>
                </div>
            </div>

            <div class="message-box card">
                <p id="game-message">무엇인가가 당신을 기다리고 있습니다...</p>
            </div>
        </main>

        <div class="controls">
            <button id="restart-btn" class="secondary-btn">다시 시작</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
