
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상 붙박이장 설치</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AI 가상 붙박이장</h1>
        <p>방 사진을 올리면, AI가 자동으로 붙박이장을 설치해 드립니다.</p>
    </header>
    <main>
        <div class="upload-container">
            <input type="file" id="image-upload" accept="image/*">
            <label for="image-upload" class="upload-btn">사진 선택</label>
        </div>
        <div class="image-container">
            <div class="image-wrapper">
                <h2>원본 사진</h2>
                <img id="original-image" src="#" alt="원본 사진">
            </div>
            <div class="image-wrapper">
                <h2>붙박이장 설치 후</h2>
                <img id="modified-image" src="#" alt="붙박이장 설치 후">
            </div>
        </div>
        <button id="add-closet-btn" class="action-btn">붙박이장 추가</button>
    </main>
    <script src="main.js"></script>
</body>
</html>
